[terminal.shell]
program = "zsh"

[window.dimensions]
columns = 80
lines = 24

[font]
size = 11.25
[font.normal]
family = "JetBrainsMono Nerd Font"

[cursor.style]
shape = "Block"
blinking = "On"
[colors.primary]
background = "#282828"
foreground = "#EBDBB2"

[colors.cursor]
cursor = "#EBDBB2"
text = "#282828"

[colors.normal]
black   = "#282828"
red     = "#CC241D"
green   = "#98971A"
yellow  = "#D79921"
blue    = "#458588"
magenta = "#B16286"
cyan    = "#689D6A"
white   = "#A89984"

[colors.bright]
black   = "#928374"
red     = "#FB4934"
green   = "#B8BB26"
yellow  = "#FABD2F"
blue    = "#83A598"
magenta = "#D3869B"
cyan    = "#8EC07C"
white   = "#EBDBB2"
