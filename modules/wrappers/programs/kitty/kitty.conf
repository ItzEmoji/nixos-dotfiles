font_family JetBrainsMono Nerd Font
font_size 11.25

confirm_os_window_close 0
cursor_shape block
cursor_blink_interval -1

remember_window_size  no
initial_window_width  800
initial_window_height 500
# Basic Colors
background #282828
foreground #EBDBB2
cursor     #EBDBB2

# Normal colors (0-7)
color0  #282828
color1  #CC241D
color2  #98971A
color3  #D79921
color4  #458588
color5  #B16286
color6  #689D6A
color7  #A89984

# Bright colors (8-15)
color8  #928374
color9  #FB4934
color10 #B8BB26
color11 #FABD2F
color12 #83A598
color13 #D3869B
color14 #8EC07C
color15 #EBDBB2
